	<!-- Login Functionality -->
	<script>
		// жҲ‘еҜ«зҡ„

		// 1. еҸ–еҫ— DOM е…ғзҙ 
		const loginBtn = document.getElementById("loginBtn"); // зҷ»е…ҘжҢүйҲ•
		const loginUserId = document.getElementById("loginUserId"); // IDж¬„
		const loginEmail = document.getElementById("loginEmail"); // еёіиҷҹ/дҝЎз®ұж¬„
		const loginPassword = document.getElementById("loginPassword"); // еҜҶзўјж¬„
		const togglePassword = document.getElementById("togglePassword"); // еҜҶзўјзңјзқӣicon

		// 2. зҷ»е…ҘжҢүйҲ•й»һж“ҠдәӢд»¶й©—иӯү
		const checkLogin =  function() {
			// IDжңүжІ’жңүеЎ«
			const userId = loginUserId.value;
			if (!userId) {
				alert("и«Ӣијёе…ҘдҪҝз”ЁиҖ…ID");
				loginUserId.focus();
				return;
			}
			// еёіиҷҹ/дҝЎз®ұжңүжІ’жңүеЎ«
			const userEmail = loginEmail.value;
			if (!userEmail) {
				alert("и«Ӣијёе…ҘеёіиҷҹжҲ–Email");
				loginEmail.focus();
				return;
			}			
			// дҝЎз®ұж јејҸе°ҚдёҚе°Қ
			const emailRegex = /^.+@.+\..{2,3}$/;
			if (!emailRegex.test(userEmail)) {
				alert("з„Ўж•Ҳзҡ„еёіиҷҹжҲ–Emailж јејҸ");
				loginEmail.focus();
				return;
			}
			// еҜҶзўјжңүжІ’жңүеЎ«
			const userPwd = loginPassword.value;
			if (!userPwd) {
				alert("и«Ӣијёе…ҘеҜҶзўј");
				loginPassword.focus();
				return;
			}

			// еёіеҜҶжҳҜеҗҰеӯҳеңЁ
			setTimeout(
				function() {
					const isUserValid = validateLogin(userId, userPwd);
					if (!isUserValid) {
						alert("дҪҝз”ЁиҖ…IDжҲ–еҜҶзўјжңүиӘӨ");
						loginPassword.focus();
						return;
					}
					alert("зҷ»е…ҘжҲҗеҠҹ");
					location.href = "home.html";
				},
				1000);

		};
		loginBtn.addEventListener("click",checkLogin)

		// жҲ‘еҜ«зҡ„

		// е…§е»ә
		// жЁЎж“¬зҷ»е…Ҙй©—иӯүеҮҪж•ё
		function validateLogin(userId, password) {
			// йҖҷиЈЎеҸҜд»ҘжӣҝжҸӣзӮәзңҹеҜҰзҡ„APIй©—иӯү
			// зӣ®еүҚдҪҝз”Ёз°Ўе–®зҡ„жЁЎж“¬й©—иӯү
			const validCredentials = [
				{ userId: '1', password: '123456' },
				{ userId: '2', password: '123456' },
				{ userId: '3', password: '123456' },
				{ userId: '4', password: '123456' },
				{ userId: '5', password: '123456' },
				{ userId: '6', password: '123456' },
				{ userId: '7', password: '123456' },
				{ userId: '8', password: '123456' },
				{ userId: '9', password: '123456' },
				{ userId: '10', password: '123456' }
			];

			// some() жҳҜ йҷЈеҲ—пјҲArrayпјүзҡ„ж–№жі•пјҢз”ЁдҫҶжё¬и©ҰйҷЈеҲ—дёӯжҳҜеҗҰгҖҢиҮіе°‘жңүдёҖеҖӢе…ғзҙ гҖҚз¬ҰеҗҲжўқд»¶гҖӮ
			// еҸӘиҰҒжүҫеҲ°дёҖеҖӢз¬ҰеҗҲжўқд»¶зҡ„е…ғзҙ пјҢе®ғе°ұжңғз«ӢеҲ»еӣһеӮі trueпјӣиӢҘе…ЁйғЁйғҪдёҚз¬ҰеҗҲпјҢеүҮеӣһеӮі falseгҖӮ
			// array.some(callback(element))
			// element йҷЈеҲ—дёӯзҡ„жҜҸеҖӢе…ғзҙ 
			return validCredentials.some(cred =>
				// console.log(cred); // дёҖеҖӢеҖӢеҚ°еҮәйҷЈеҲ—иЈЎзҡ„зү©д»¶
				cred.userId === userId && cred.password === password
			);
		}
