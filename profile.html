	<!-- Profile Functionality -->
	<script>
		document.addEventListener('DOMContentLoaded', function () {
			loadUserProfile();
		});

		// 從 mock-api-data.json 載入使用者資料
		async function fetchUserData() {
			try {
				const response = await fetch('./mock-api-data.json');
				const data = await response.json();
				return data;
			} catch (error) {
				console.error('Error fetching user data:', error);
				return [];
			}
		}

		// 從 sessionStorage 獲取使用者ID
		function getUserId() {
			return sessionStorage.getItem('userId');
		}

		// 更新頁面內容
		function updateProfileContent(user) {
			// 更新頭像
			const userPhoto = document.getElementById("userPhoto");
			const userImgUrl = user.image;
			userPhoto.style.backgroundImage = `url('${userImgUrl.substring(2,userImgUrl.length)}')`;

			// 更新基本資訊
			document.querySelector('.profile-detail .name').textContent = `${user.name}, ${user.age}`;
			document.querySelector('.profile-detail p').innerHTML = `<i class="icon feather icon-map-pin me-1"></i> ${user.location}`;

			// 更新頁面標題
			document.title = `${user.name}的個人資料 - 資展國際js課程`;
		}

		// 載入並顯示使用者資料
		async function loadUserProfile() {
			try {
				const userId = getUserId();
				console.log('Loading profile for userId:', userId);

				if (!userId) {
					console.error('No user ID found');
					showErrorMessage('找不到使用者ID，請先登入');
					return;
				}

				// 載入所有使用者資料
				const allUsers = await fetchUserData();

				// 找到對應的使用者
				// .toString()：「確保型別一致」在比對時不出錯，JavaScript 在比對（===）時會區分型別
				const user = allUsers.find(u => u.id.toString() === userId.toString());

				if (!user) {
					console.error('User not found for ID:', userId);
					// showErrorMessage 在最下面已經附給學生了
					showErrorMessage('找不到使用者資料');
					return;
				}

				console.log('Found user:', user);

				// 更新頁面內容
				updateProfileContent(user);

			} catch (error) {
				console.error('載入使用者資料時發生錯誤:', error);
				showErrorMessage('載入使用者資料失敗');
			}
		}
	</script>
	<script>
		// 顯示錯誤訊息
		function showErrorMessage(message) {
			document.querySelector('.profile-area').innerHTML = `
				<div class="d-flex align-items-center justify-content-center" style="min-height: 70vh; padding: 2rem 0;">
					<div class="text-center">
						<i class="fa-solid fa-exclamation-triangle text-warning mb-3" style="font-size: 3.5rem;"></i>
						<h4 class="text-warning mb-3">載入失敗</h4>
						<p class="text-muted mb-4">${message}</p>
						<div class="d-flex flex-column flex-sm-row gap-2 justify-content-center">
							<button onclick="loadUserProfile()" class="btn btn-primary">重新載入</button>
							<a href="login.html" class="btn btn-secondary">重新登入</a>
						</div>
					</div>
				</div>
			`;
		}
	</script>
